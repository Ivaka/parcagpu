---
# ServiceAccount for the parcagpu webhook
apiVersion: v1
kind: ServiceAccount
metadata:
  name: parcagpu-webhook
  namespace: kube-system
---
# ClusterRole — webhook needs to read pods to verify labels
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: parcagpu-webhook
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: parcagpu-webhook
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: parcagpu-webhook
subjects:
  - kind: ServiceAccount
    name: parcagpu-webhook
    namespace: kube-system
