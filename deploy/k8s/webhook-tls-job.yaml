---
# Job that generates a self-signed TLS cert for the webhook, creates a Kubernetes
# TLS secret, and patches the MutatingWebhookConfiguration with the CA bundle.
# Runs once at install time.
apiVersion: batch/v1
kind: Job
metadata:
  name: parcagpu-webhook-tls
  namespace: kube-system
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: parcagpu-webhook
      containers:
        - name: tls-gen
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              set -e
              echo "Installing openssl and kubectl..."
              apk add --no-cache openssl kubectl

              echo "Generating self-signed TLS certificate..."
              mkdir -p /certs

              # Generate private key
              openssl ecparam -genkey -name prime256v1 -out /certs/tls.key -noout

              # Generate CSR
              openssl req -new -key /certs/tls.key -out /certs/tls.csr \
                -subj "/CN=parcagpu-webhook.kube-system.svc"

              # Create SAN config
              cat > /certs/san.cnf <<EOF
              [req]
              distinguished_name = req_distinguished_name
              [req_distinguished_name]
              [v3_req]
              subjectAltName = @alt_names
              [alt_names]
              DNS.1 = parcagpu-webhook
              DNS.2 = parcagpu-webhook.kube-system
              DNS.3 = parcagpu-webhook.kube-system.svc
              DNS.4 = parcagpu-webhook.kube-system.svc.cluster.local
              EOF

              # Self-sign the cert
              openssl x509 -req -in /certs/tls.csr -signkey /certs/tls.key \
                -out /certs/tls.crt -days 365 \
                -extfile /certs/san.cnf -extensions v3_req

              echo "Creating Kubernetes TLS secret..."
              kubectl create secret tls parcagpu-webhook-tls \
                --cert=/certs/tls.crt --key=/certs/tls.key \
                -n kube-system --dry-run=client -o yaml | kubectl apply -f -

              echo "Patching MutatingWebhookConfiguration with CA bundle..."
              # Use tr to strip newlines — Alpine's base64 doesn't support -w0
              CA_BUNDLE=$(cat /certs/tls.crt | base64 | tr -d '\n')
              kubectl patch mutatingwebhookconfiguration parcagpu-webhook \
                --type='json' -p="[{\"op\":\"replace\",\"path\":\"/webhooks/0/clientConfig/caBundle\",\"value\":\"${CA_BUNDLE}\"}]"

              echo "Done. TLS certificate and webhook configuration installed."
          volumeMounts:
            - name: certs
              mountPath: /certs
      volumes:
        - name: certs
          emptyDir: {}
